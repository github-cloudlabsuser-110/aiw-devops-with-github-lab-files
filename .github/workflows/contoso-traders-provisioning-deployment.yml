name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set Up Docker Image with AzCopy Pre-installed
      run: |
        docker pull mcr.microsoft.com/azure-cli:2.68.0
        docker run --rm -v $PWD:/app -w /app \
          --name azure-cli-container \
          mcr.microsoft.com/azure-cli:2.68.0 azcopy --version || \
          echo "AzCopy pre-installed"

    - name: Deploy Resources
      env:
        STORAGE_ACCOUNT_NAME: ${{ secrets.STORAGE_ACCOUNT_NAME }}
        STORAGE_ACCOUNT_KEY: ${{ secrets.STORAGE_ACCOUNT_KEY }}
      run: |
        # Explicit credentials to avoid warnings
        az storage blob upload-batch \
          --account-name $STORAGE_ACCOUNT_NAME \
          --account-key $STORAGE_ACCOUNT_KEY \
          --destination container-name \
          --source ./local-folder
      shell: bash

    - name: Verify AzCopy Installation
      run: |
        docker exec azure-cli-container azcopy --version || \
        echo "AzCopy failed to install"

    - name: Clean Up
      run: docker rm azure-cli-container || echo "No container to clean"
